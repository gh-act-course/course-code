name: Docker
on: [workflow_dispatch]

jobs:
  docker-job:
    runs-on: ubuntu-latest
    container:
      image: node:24-alpine3.24
    #   credentials:
    #     username:
    #     password:
      env:
        API_URL: some-url.com
      ports:
        - 80
    #   volumes:
    #     - vol_name:/path/in/container
    #     - /path/to/container
    #     - /path/in/host:/path/in/container
    steps:
      - name: Log Node & OS Versions
        run: |
          node -v
          cat /etc/os-release
      - name: Log Env
        run: echo $API_URL